<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — WorthDaGive Wellness Studio</title>

<link rel="stylesheet" href="styles.css">

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<!-- APP -->
<script defer src="products.js"></script>
<script defer src="auth.js"></script>

</head>
<body>

<div id="mainContent">

    <!-- PROMO BANNER (CONSISTENT) -->
    <div id="promoBanner" class="promo-banner">
        <div class="promo-banner-inner">
            <span id="promoBannerText">
                Browse our premium product range — Lab-Tested & Legally Compliant
            </span>
            <button id="promoBannerClose">&times;</button>
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html">WorthDaGive</a>
            </div>

            <nav>
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="#" id="loginBtn">Login</a>
                <a href="#" id="cartBtn">Cart (<span id="cartCount">0</span>)</a>
            </nav>
        </div>
    </header>

    <!-- TITLE -->
    <section class="page-banner">
        <h2>Our Products</h2>
        <p>Premium cannabis products</p>
    </section>

    <!-- PRODUCTS -->
    <section class="products-section">
        <div class="container">
            <div id="productGrid" class="product-grid"></div>
        </div>
    </section>

</div>

</html>
