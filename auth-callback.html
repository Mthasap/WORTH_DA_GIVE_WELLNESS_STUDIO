<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — WorthDaGive</title>
<link rel="stylesheet" href="styles.css">
<style>
.reset-wrap{max-width:440px;margin:80px auto;background:#fff;border-radius:14px;padding:2.5rem;box-shadow:0 6px 24px rgba(0,0,0,0.1);text-align:center}
.reset-wrap h2{color:#2c5530;margin-bottom:0.5rem}
.reset-wrap p{color:#888;font-size:0.9rem;margin-bottom:1.5rem}
.reset-field{text-align:left;margin-bottom:1rem}
.reset-field label{display:block;font-size:0.82rem;font-weight:700;color:#555;margin-bottom:5px}
.reset-field input{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:1rem;transition:border-color 0.2s}
.reset-field input:focus{border-color:#4CAF50;outline:none}
.reset-msg{padding:10px 14px;border-radius:8px;font-size:0.88rem;font-weight:700;margin-bottom:12px;display:none}
.reset-msg.ok{background:#d4edda;color:#155724;display:block}
.reset-msg.err{background:#f8d7da;color:#721c24;display:block}
</style>
</head>
<body style="background:#f8f9fa;min-height:100vh">

<header>
  <div class="container">
    <div class="logo">
      <a href="index.html">
        <img src="https://res.cloudinary.com/dbcfzmxzt/image/upload/v1775733144/main_logo_hm6s6w.png" alt="WorthDaGive" class="logo-img" loading="lazy">
        <div class="logo-text"><h1>WorthDaGive</h1><span class="tagline">Wellness Studio</span></div>
      </a>
    </div>
  </div>
</header>

<div class="reset-wrap">
  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 1rem;display:block"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
  <h2>Set New Password</h2>
  <p>Enter your new password below. Make it strong — at least 8 characters.</p>

  <div id="resetMsg" class="reset-msg"></div>

  <div id="resetForm">
    <div class="reset-field">
      <label>New Password</label>
      <input type="password" id="newPw" placeholder="Minimum 8 characters" autocomplete="new-password">
    </div>
    <div class="reset-field">
      <label>Confirm New Password</label>
      <input type="password" id="newPw2" placeholder="Repeat password" autocomplete="new-password">
    </div>
    <button class="btn-primary" style="width:100%;padding:13px" onclick="doReset()" id="resetBtn">Update Password</button>
  </div>

  <p style="margin-top:1.2rem;font-size:0.82rem"><a href="index.html" style="color:#4CAF50">← Back to home</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = "https://tndsmvsuowqdmhtatmie.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuZHNtdnN1b3dxZG1odGF0bWllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzM0MjAsImV4cCI6MjA5MDkwOTQyMH0.KLd3B-MQI1BBJSg98lfFugnqPDqeBBBGuM-cRbI0Eyw";

function showMsg(msg, type) {
  var el = document.getElementById('resetMsg');
  el.textContent = msg;
  el.className = 'reset-msg ' + type;
}

async function doReset() {
  var pw  = document.getElementById('newPw').value;
  var pw2 = document.getElementById('newPw2').value;
  if (!pw || pw.length < 8) { showMsg('Password must be at least 8 characters.', 'err'); return; }
  if (pw !== pw2)           { showMsg('Passwords do not match.', 'err'); return; }

  var btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.textContent = 'Updating…';

  try {
    var SB = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var res = await SB.auth.updateUser({ password: pw });
    if (res.error) throw res.error;
    showMsg('✅ Password updated successfully! Redirecting to sign in…', 'ok');
    document.getElementById('resetForm').style.display = 'none';
    setTimeout(function() { window.location.href = 'index.html'; }, 2500);
  } catch(e) {
    showMsg('Error: ' + (e.message || 'Could not update password. The reset link may have expired.'), 'err');
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
}
</script>
</body>
</html>
